services:
  caddy:
    image: caddy:2-alpine
    container_name: contentor-caddy-dev
    ports:
      - "80:80"
    environment:
      - CONTENTOR_DOMAIN=${CONTENTOR_DOMAIN:-localhost}
      - FORWARDED_PROTO=http
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - django
      - nextjs-main
      - nextjs-customer
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-contentor}
      POSTGRES_USER: ${POSTGRES_USER:-contentor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contentor} -d ${POSTGRES_DB:-contentor}"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb -p local/$${AWS_BUCKET_NAME:-contentor-dev-private} || true"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME:-contentor-dev-private}

  django:
    build:
      context: ./backend
      args:
        INSTALL_CLAUDE_CLI: "1"
    # --timeout 600: a Design-with-AI icon turn is a blocking HTTP call whose
    # worst case is cli 240s x 2 attempts (schema retry) + Gemini image
    # generation ~60s; 300 killed workers mid-retry (CRITICAL WORKER TIMEOUT
    # on logo-converse, seen 2026-07-12). Dev-only: Caddy doesn't cap proxy
    # response time locally.
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload --graceful-timeout 30 --timeout 600
    environment:
      CURATED_LOGO_SYNC_DIR: /app/logo_sync
      CURATED_PHOTO_SYNC_DIR: /app/photo_sync
      LOGS_INGEST_TOKEN: ${LOGS_INGEST_TOKEN:-dev-logs-token}
    volumes:
      - ./backend:/app/backend
      - ./frontend-customer/public/logos:/app/logo_sync
      - ./frontend-customer/public/curated-photos:/app/photo_sync
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nextjs-customer:
    build:
      context: .
      dockerfile: frontend-customer/Dockerfile
      target: dev
    command: npm run dev -- -p 3000
    volumes:
      - ./frontend-customer/src:/app/src
      - ./frontend-customer/public:/app/public
      - ./frontend-customer/messages:/app/messages
      - ./frontend-customer/next.config.mjs:/app/next.config.mjs
      - ./frontend-customer/package.json:/app/package.json
      - ./packages:/packages
    environment:
      - NEXT_PUBLIC_API_URL=http://django:8000
      - NEXT_PUBLIC_BASE_DOMAIN=${CONTENTOR_DOMAIN:-localhost}
      - NEXT_PUBLIC_GETSTREAM_API_KEY=${GETSTREAM_API_KEY}
    depends_on:
      - django

  nextjs-main:
    build:
      context: .
      dockerfile: frontend-main/Dockerfile
      target: dev
    command: npm run dev -- -p 3000
    volumes:
      - ./frontend-main/src:/app/src
      - ./frontend-main/public:/app/public
      - ./frontend-main/messages:/app/messages
      - ./frontend-main/next.config.mjs:/app/next.config.mjs
      - ./frontend-main/middleware.ts:/app/middleware.ts
      - ./frontend-main/package.json:/app/package.json
      - ./packages:/packages
    environment:
      - NEXT_PUBLIC_API_URL=http://django:8000
      - NEXT_PUBLIC_BASE_DOMAIN=${CONTENTOR_DOMAIN:-localhost}
    depends_on:
      - django

  celery-worker:
    build:
      context: ./backend
    command: celery -A config.celery worker -l info --concurrency=2
    volumes:
      - ./backend:/app/backend
    env_file: .env
    depends_on:
      django:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
    command: celery -A config.celery beat -l info
    volumes:
      - ./backend:/app/backend
    env_file: .env
    depends_on:
      - celery-worker

  vector:
    image: timberio/vector:0.46.1-alpine
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - vector_data:/var/lib/vector
    command: --config /etc/vector/vector.yaml
    environment:
      - LOGS_INGEST_TOKEN=${LOGS_INGEST_TOKEN:-dev-logs-token}
    depends_on:
      django:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
    ports:
      - "9090:9090"
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    profiles:
      - monitoring

  loki:
    image: grafana/loki:latest
    volumes:
      - ./monitoring/loki:/etc/loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    profiles:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8081:8080"
    profiles:
      - monitoring

volumes:
  postgres_data:
  minio_data:
  vector_data:
