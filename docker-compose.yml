services:
  traefik:
    image: traefik:v3.2
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-contentor}
      POSTGRES_USER: ${POSTGRES_USER:-contentor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contentor} -d ${POSTGRES_DB:-contentor}"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  django:
    build:
      context: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload --graceful-timeout 30
    volumes:
      - ./backend:/app/backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.django-api.rule=PathPrefix(`/api/v1`) || PathPrefix(`/api/health`)"
      - "traefik.http.routers.django-api.entrypoints=web"
      - "traefik.http.routers.django-api.priority=10"
      - "traefik.http.routers.django-admin.rule=(Host(`contentor.localhost`) || Host(`localhost`) || Host(`tr.contentor.localhost`) || Host(`tr.localhost`)) && (PathPrefix(`/admin`) || PathPrefix(`/static/admin`))"
      - "traefik.http.routers.django-admin.entrypoints=web"
      - "traefik.http.routers.django-admin.priority=10"
      - "traefik.http.services.django.loadbalancer.server.port=8000"

  django-channels:
    build:
      context: ./backend
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    volumes:
      - ./backend:/app/backend
    env_file: .env
    depends_on:
      django:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.channels.rule=PathPrefix(`/ws`)"
      - "traefik.http.routers.channels.entrypoints=web"
      - "traefik.http.services.channels.loadbalancer.server.port=8001"

  nextjs-customer:
    build:
      context: ./frontend-customer
      target: dev
    command: npm run dev -- -p 3001
    volumes:
      - ./frontend-customer/src:/app/src
      - ./frontend-customer/public:/app/public
      - ./frontend-customer/messages:/app/messages
      - ./frontend-customer/next.config.mjs:/app/next.config.mjs
      - ./frontend-customer/package.json:/app/package.json
    environment:
      - NEXT_PUBLIC_API_URL=http://django:8000
      - NEXT_PUBLIC_BASE_DOMAIN=${CONTENTOR_DOMAIN:-contentor.localhost}
      - NEXT_PUBLIC_GETSTREAM_API_KEY=${GETSTREAM_API_KEY}
    depends_on:
      - django
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextjs-customer.rule=HostRegexp(`.+`)"
      - "traefik.http.routers.nextjs-customer.entrypoints=web"
      - "traefik.http.routers.nextjs-customer.priority=1"
      - "traefik.http.services.nextjs-customer.loadbalancer.server.port=3001"

  nextjs-main:
    build:
      context: ./frontend-main
      target: dev
    command: npm run dev -- -p 3000
    volumes:
      - ./frontend-main/src:/app/src
      - ./frontend-main/public:/app/public
      - ./frontend-main/messages:/app/messages
      - ./frontend-main/next.config.mjs:/app/next.config.mjs
      - ./frontend-main/middleware.ts:/app/middleware.ts
      - ./frontend-main/package.json:/app/package.json
    environment:
      - NEXT_PUBLIC_API_URL=http://django:8000
      - NEXT_PUBLIC_BASE_DOMAIN=${CONTENTOR_DOMAIN:-contentor.localhost}
    depends_on:
      - django
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextjs-main.rule=Host(`contentor.localhost`) || Host(`localhost`) || Host(`tr.contentor.localhost`) || Host(`tr.localhost`)"
      - "traefik.http.routers.nextjs-main.entrypoints=web"
      - "traefik.http.routers.nextjs-main.priority=2"
      - "traefik.http.services.nextjs-main.loadbalancer.server.port=3000"

  celery-worker:
    build:
      context: ./backend
    command: celery -A config.celery worker -l info --concurrency=2
    volumes:
      - ./backend:/app/backend
    env_file: .env
    depends_on:
      django:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
    command: celery -A config.celery beat -l info
    volumes:
      - ./backend:/app/backend
    env_file: .env
    depends_on:
      - celery-worker


  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
    ports:
      - "9090:9090"
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    profiles:
      - monitoring

  loki:
    image: grafana/loki:latest
    volumes:
      - ./monitoring/loki:/etc/loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    profiles:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8081:8080"
    profiles:
      - monitoring

volumes:
  postgres_data:
