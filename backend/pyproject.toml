[tool.ruff]
target-version = "py312"
line-length = 120
src = ["backend"]

[tool.ruff.lint]
select = ["E", "F", "I", "S", "B", "UP", "N", "C4", "SIM", "TCH"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
# Demo seeding uses random for decorative variety, not cryptography.
"**/management/commands/seed_demo_tenant.py" = ["S311"]
# Courses tests use hard-coded passwords for fixtures - not a security issue.
"**/apps/courses/tests/test_views.py" = ["S106"]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
plugins = ["mypy_django_plugin.main", "mypy_drf_plugin.main"]
ignore_missing_imports = true
warn_unused_configs = true
warn_redundant_casts = true

[tool.django-stubs]
django_settings_module = "config.settings.dev"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.dev"
python_files = ["tests.py", "test_*.py"]
addopts = "-v --tb=short"

[tool.bandit]
exclude_dirs = ["tests", "venv"]
skips = ["B101"]
