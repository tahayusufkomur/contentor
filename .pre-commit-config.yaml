repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --config=backend/pyproject.toml]
        files: ^backend/
      - id: ruff-format
        args: [--config=backend/pyproject.toml]
        files: ^backend/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-r, backend/apps/, -c, backend/pyproject.toml, -ll]
        files: ^backend/
        pass_filenames: false

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^(docs/screenshot-map/|docs/superpowers/plans/|.*/tests/.*)

  - repo: local
    hooks:
      # Each app runs its own eslint/prettier install; filenames arrive
      # repo-relative, so the app prefix is stripped after the cd.
      - id: frontend-main-eslint
        name: Frontend-main ESLint
        entry: bash -c 'cd frontend-main && npx --no-install eslint --fix "${@#frontend-main/}"' --
        language: system
        files: ^frontend-main/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: true

      - id: frontend-customer-eslint
        name: Frontend-customer ESLint
        entry: bash -c 'cd frontend-customer && npx --no-install eslint --fix "${@#frontend-customer/}"' --
        language: system
        files: ^frontend-customer/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: true

      - id: frontend-main-prettier
        name: Frontend-main Prettier
        entry: bash -c 'cd frontend-main && npx --no-install prettier --write "${@#frontend-main/}"' --
        language: system
        files: ^frontend-main/.*\.(ts|tsx|js|jsx|css|json)$
        exclude: (package-lock\.json|\.next/)
        pass_filenames: true

      - id: frontend-customer-prettier
        name: Frontend-customer Prettier
        entry: bash -c 'cd frontend-customer && npx --no-install prettier --write "${@#frontend-customer/}"' --
        language: system
        files: ^frontend-customer/.*\.(ts|tsx|js|jsx|css|json)$
        exclude: (package-lock\.json|\.next/)
        pass_filenames: true

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args: [--config=.gitleaks.toml]
